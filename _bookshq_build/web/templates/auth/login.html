{% extends "base.html" %}
{% block title %}Sign in · Books HQ{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10 bg-white border border-slate-200 rounded-xl p-6">
  <h1 class="text-lg font-bold mb-1">Sign in</h1>
  <p class="text-sm text-slate-500 mb-4">Welcome back to Books HQ.</p>
  {% if error %}<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-md px-3 py-2 mb-3">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="space-y-3">
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
      <input name="email" type="email" required value="{{ email or '' }}"
             class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none">
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
      <input name="password" type="password" required
             class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none">
    </div>
    <button class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-md py-2 text-sm">Sign in</button>
  </form>
  <p class="text-sm text-slate-500 mt-4 text-center">New here?
    <a href="/signup" class="text-amber-600 font-semibold">Create an account</a></p>
</div>
{% endblock %}
