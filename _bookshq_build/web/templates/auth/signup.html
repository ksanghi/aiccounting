{% extends "base.html" %}
{% block title %}Create account · Books HQ{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10 bg-white border border-slate-200 rounded-xl p-6">
  <h1 class="text-lg font-bold mb-1">Create your account</h1>
  <p class="text-sm text-slate-500 mb-4">Start keeping your books in the cloud.</p>
  {% if error %}<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-md px-3 py-2 mb-3">{{ error }}</div>{% endif %}
  <form method="post" action="/signup" class="space-y-3">
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1">Your name</label>
      <input name="name" value="{{ name or '' }}"
             class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none">
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
      <input name="email" type="email" required value="{{ email or '' }}"
             class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none">
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
      <input name="password" type="password" required minlength="8"
             class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none">
      <p class="text-xs text-slate-400 mt-1">At least 8 characters.</p>
    </div>
    <button class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-md py-2 text-sm">Create account</button>
  </form>
  <p class="text-sm text-slate-500 mt-4 text-center">Already have an account?
    <a href="/login" class="text-amber-600 font-semibold">Sign in</a></p>
</div>
{% endblock %}
