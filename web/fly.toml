app = 'bookshq-web-staging'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DATABASE_URL = 'sqlite:////data/bookshq_app.db'
  ACCGENIE_DATA_DIR = '/data'
  BOOKSHQ_COUNTRY = 'US'

[[mounts]]
  source = 'bookshq_web_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
